spring:
  application:
    name: whynago

  datasource:
    url: ${DB_URL:jdbc:h2:mem:whynago;}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never
jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 1800000
  refresh:
    expiration: 604800000
