spring:
  application:
    name: whynago

  datasource:
    url: ${DB_URL:jdbc:h2:mem:whynago;}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

  ai:
    model:
      embedding: none
    openai:
      api-key: ${API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions
        options:
          model: gemini-3.5-flash
          temperature: 0.7
jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 1800000
  refresh:
    expiration: 604800000
