spring:
  application:
    name: whynago

  datasource:
    url: jdbc:h2:mem:ibid;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:local-access-secret-change-me-0123456789}
  access:
    expiration: 1800000
  refresh:
    expiration: 604800000
